# Privacy policy: static HTML (Play Store / crawlers without JS)
[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/privacy-policy/"
  to = "/privacy-policy.html"
  status = 200

# Proxy API and media to backend (avoids CORS in production)
[[redirects]]
  from = "/api/*"
  to = "https://api.findgarageandyardsale.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/media/*"
  to = "https://api.findgarageandyardsale.com/media/:splat"
  status = 200
  force = true

# SPA fallback: serve index.html for app routes (existing files like /assets/* are served first)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "npm run build"
  publish = "dist"
